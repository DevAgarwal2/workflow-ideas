name: Secret Scan

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan for common secrets
        run: |
          rg -n --hidden \
            --glob '!.env*' \
            --glob '!node_modules' \
            --glob '!.next' \
            --glob '!bun.lock' \
            --glob '!package-lock.json' \
            --glob '!pnpm-lock.yaml' \
            --glob '!yarn.lock' \
            '(postgres(?:ql)?://|DATABASE_URL\s*=\s*"?postgres|npg_[A-Za-z0-9]+|AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]*PRIVATE KEY-----)' .
